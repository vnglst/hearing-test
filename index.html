<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hearing Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #e2e2e2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e42;
      border-radius: 1.25rem;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      text-align: center;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c6c88;
      margin-bottom: 0.6rem;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #2e2e42;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #7c6af5;
      cursor: pointer;
      transition: background 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #9a8bf7;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: #7c6af5;
      cursor: pointer;
    }

    .value-display {
      font-size: 0.9rem;
      font-weight: 600;
      color: #a89df9;
      min-width: 4.5rem;
      text-align: right;
    }

    /* Frequency number input */
    .freq-input {
      background: #0f0f13;
      border: 1px solid #2e2e42;
      border-radius: 0.5rem;
      color: #e2e2e2;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.4rem 0.6rem;
      width: 90px;
      text-align: center;
      outline: none;
    }

    .freq-input:focus {
      border-color: #7c6af5;
    }

    /* Channel slider */
    .channel-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.4rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: #6c6c88;
    }

    .channel-labels span.active-label {
      color: #a89df9;
    }

    /* Play button */
    .play-btn {
      background: #7c6af5;
      border: none;
      border-radius: 0.75rem;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.9rem;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
    }

    .play-btn:hover { background: #9a8bf7; }
    .play-btn:active { transform: scale(0.98); }

    .play-btn.playing {
      background: #c0392b;
    }

    .play-btn.playing:hover {
      background: #e74c3c;
    }

    /* Preset frequencies */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .preset-btn {
      background: #0f0f13;
      border: 1px solid #2e2e42;
      border-radius: 0.4rem;
      color: #8888a8;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.55rem;
      transition: all 0.15s;
    }

    .preset-btn:hover {
      border-color: #7c6af5;
      color: #c0b8ff;
    }

    .status {
      text-align: center;
      font-size: 0.8rem;
      color: #6c6c88;
      min-height: 1.2em;
    }

    .status.active {
      color: #7c6af5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hearing Test</h1>

    <!-- Frequency -->
    <div>
      <div class="section-label">Frequency</div>
      <div class="row">
        <input type="range" id="freqSlider" min="20" max="20000" step="1" value="1000">
        <input type="number" id="freqInput" class="freq-input" min="20" max="20000" value="1000">
      </div>
      <div style="margin-top:0.75rem">
        <div class="section-label">Presets</div>
        <div class="presets" id="presets"></div>
      </div>
    </div>

    <!-- Volume -->
    <div>
      <div class="section-label">Volume</div>
      <div class="row">
        <input type="range" id="volSlider" min="0" max="100" value="50">
        <span class="value-display" id="volDisplay">50%</span>
      </div>
    </div>

    <!-- Channel -->
    <div>
      <div class="section-label">Pan</div>
      <div class="row">
        <input type="range" id="chSlider" min="-100" max="100" step="1" value="0">
        <span class="value-display" id="chDisplay">Center</span>
      </div>
      <div class="channel-labels">
        <span>Left</span>
        <span>Center</span>
        <span>Right</span>
      </div>
    </div>

    <!-- Play -->
    <button class="play-btn" id="playBtn">Play Tone</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const PRESETS = [20, 100, 250, 500, 1000, 2000, 4000, 8000, 12000, 16000, 20000];

    let audioCtx = null;
    let oscillator = null;
    let panner = null;
    let masterGain = null;
    let playing = false;

    const freqSlider = document.getElementById('freqSlider');
    const freqInput = document.getElementById('freqInput');
    const volSlider = document.getElementById('volSlider');
    const volDisplay = document.getElementById('volDisplay');
    const chSlider = document.getElementById('chSlider');
    const chDisplay = document.getElementById('chDisplay');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const presetsEl = document.getElementById('presets');

    // Build presets
    PRESETS.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = f >= 1000 ? (f / 1000) + ' kHz' : f + ' Hz';
      btn.addEventListener('click', () => setFrequency(f));
      presetsEl.appendChild(btn);
    });

    function setFrequency(f) {
      f = Math.max(20, Math.min(20000, Math.round(f)));
      freqSlider.value = f;
      freqInput.value = f;
      if (oscillator) oscillator.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.01);
      updateStatus();
    }

    freqSlider.addEventListener('input', () => setFrequency(+freqSlider.value));
    freqInput.addEventListener('input', () => setFrequency(+freqInput.value));
    freqInput.addEventListener('change', () => setFrequency(+freqInput.value));

    volSlider.addEventListener('input', () => {
      const v = +volSlider.value;
      volDisplay.textContent = v + '%';
      if (masterGain) masterGain.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.01);
    });

    function panLabel(v) {
      if (v === 0) return 'Center';
      const pct = Math.abs(v);
      return v < 0 ? `L ${pct}%` : `R ${pct}%`;
    }

    chSlider.addEventListener('input', () => {
      const v = +chSlider.value;
      chDisplay.textContent = panLabel(v);
      if (panner) panner.pan.setTargetAtTime(v / 100, audioCtx.currentTime, 0.01);
      updateStatus();
    });

    function applyPan() {
      if (!panner) return;
      panner.pan.value = +chSlider.value / 100;
    }

    function updateStatus() {
      if (!playing) { status.textContent = ''; status.className = 'status'; return; }
      const f = +freqSlider.value;
      const v = +volSlider.value;
      const pan = +chSlider.value;
      status.textContent = `Playing ${f} Hz at ${v}% volume — ${panLabel(pan)}`;
      status.className = 'status active';
    }

    playBtn.addEventListener('click', () => {
      if (playing) {
        stopTone();
      } else {
        startTone();
      }
    });

    function startTone() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      oscillator = audioCtx.createOscillator();
      oscillator.type = 'sine';
      oscillator.frequency.value = +freqSlider.value;

      masterGain = audioCtx.createGain();
      masterGain.gain.value = +volSlider.value / 100;

      panner = audioCtx.createStereoPanner();

      oscillator.connect(panner);
      panner.connect(masterGain);
      masterGain.connect(audioCtx.destination);

      applyPan();
      oscillator.start();

      playing = true;
      playBtn.textContent = 'Stop';
      playBtn.classList.add('playing');
      updateStatus();
    }

    function stopTone() {
      if (oscillator) {
        oscillator.stop();
        oscillator.disconnect();
        oscillator = null;
        panner = null;
      }
      playing = false;
      playBtn.textContent = 'Play Tone';
      playBtn.classList.remove('playing');
      status.textContent = '';
      status.className = 'status';
    }
  </script>
</body>
</html>
